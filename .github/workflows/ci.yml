name: CI

on:
  push:
    branches: [main, claud]
  pull_request:

jobs:
  backend:
    name: Back-end — test & check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-end

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Run unit tests
        run: ./gradlew test

      - name: Run static checks
        run: ./gradlew check -x test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: back-end/**/build/reports/tests/

  compose-config:
    name: Compose config — online
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/online

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose syntax and variable substitution
        run: |
          cp .env.example .env
          docker compose config
