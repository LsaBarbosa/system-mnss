name: CI

on:
  push:
    branches: [main, claud]
  pull_request:

jobs:
  backend:
    name: Back-end — test & check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-end

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Run unit tests
        run: ./gradlew test

      - name: Run static checks
        run: ./gradlew check -x test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: back-end/**/build/reports/tests/

  frontend:
    name: Front-end — lint, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build local
        run: npm run build:local

      - name: Build online
        run: npm run build:online

  compose-config-online:
    name: Compose config — online
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/online

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose syntax and variable substitution
        run: |
          cp .env.example .env
          docker compose config

  compose-config-local:
    name: Compose config — local
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/local

    steps:
      - uses: actions/checkout@v4

      - name: Validate local docker-compose syntax
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi
          docker compose config

  openapi-contracts:
    name: OpenAPI contracts — validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-end

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Validate OpenAPI contracts
        run: ./gradlew :shared-infra:test --tests "*OpenApiValidationTest*"
