spring:
  config:
    activate:
      on-profile: dev
  datasource:
    username: ${MNSS_LOCAL_DB_USER:dev_user}
    password: ${MNSS_LOCAL_DB_PASSWORD:dev_password}
  rabbitmq:
    username: ${MNSS_LOCAL_RABBITMQ_USER:dev_user}
    password: ${MNSS_LOCAL_RABBITMQ_PASSWORD:dev_password}

mnss:
  security:
    token:
      secret: ${AUTH_TOKEN_SECRET:dev_only_auth_token_secret_not_for_production}
    initial-admin:
      password: ${MNSS_INITIAL_ADMIN_PASSWORD:dev_only_admin_password}
  sync:
    store-secret: ${MNSS_STORE_SECRET:dev_only_store_secret_not_for_production}
    require-https: ${MNSS_SYNC_REQUIRE_HTTPS:false}
