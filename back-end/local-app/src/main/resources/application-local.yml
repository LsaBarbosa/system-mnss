spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${MNSS_LOCAL_DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:nova_alianca_local}}
    username: ${MNSS_LOCAL_DB_USER:${POSTGRES_USER:nova_alianca}}
    password: ${MNSS_LOCAL_DB_PASSWORD:${POSTGRES_PASSWORD}}
  rabbitmq:
    host: ${MNSS_LOCAL_RABBITMQ_HOST:${RABBITMQ_HOST:localhost}}
    port: ${MNSS_LOCAL_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
    username: ${MNSS_LOCAL_RABBITMQ_USER:${RABBITMQ_DEFAULT_USER:nova_alianca}}
    password: ${MNSS_LOCAL_RABBITMQ_PASSWORD:${RABBITMQ_DEFAULT_PASS}}
  data:
    redis:
      host: ${MNSS_LOCAL_REDIS_HOST:${REDIS_HOST:localhost}}
      port: ${MNSS_LOCAL_REDIS_PORT:${REDIS_PORT:6379}}

server:
  port: ${MNSS_LOCAL_API_PORT:${LOCAL_API_PORT:8080}}

mnss:
  environment: local
  local:
    database-host: ${DB_HOST:postgres-local}
    database-port: ${DB_PORT:5432}
    database-name: ${POSTGRES_DB:nova_alianca_local}
    database-user: ${MNSS_LOCAL_DB_USER:${POSTGRES_USER:nova_alianca}}
    database-password: ${MNSS_LOCAL_DB_PASSWORD:${POSTGRES_PASSWORD}}
    rabbitmq-host: ${MNSS_LOCAL_RABBITMQ_HOST:${RABBITMQ_HOST:rabbitmq-local}}
    rabbitmq-user: ${MNSS_LOCAL_RABBITMQ_USER:${RABBITMQ_DEFAULT_USER:nova_alianca}}
    rabbitmq-password: ${MNSS_LOCAL_RABBITMQ_PASSWORD:${RABBITMQ_DEFAULT_PASS}}
    redis-host: ${MNSS_LOCAL_REDIS_HOST:${REDIS_HOST:redis-local}}
    redis-port: ${MNSS_LOCAL_REDIS_PORT:${REDIS_PORT:6379}}
    online-sync-base-url: ${MNSS_ONLINE_URL:${ONLINE_SYNC_BASE_URL:}}
    store-id: ${MNSS_STORE_ID:${STORE_ID:}}
    store-secret: ${MNSS_STORE_SECRET:${STORE_SECRET:}}
  sync:
    online-url: ${MNSS_ONLINE_URL}
    store-id: ${MNSS_STORE_ID}
    store-secret: ${MNSS_STORE_SECRET}
    require-https: ${MNSS_SYNC_REQUIRE_HTTPS:false}
