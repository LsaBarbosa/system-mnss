spring:
  application:
    name: mnss-local-api
  datasource:
    url: ${MNSS_LOCAL_DB_URL:jdbc:postgresql://localhost:5432/nova_alianca_local}
    username: ${MNSS_LOCAL_DB_USER}
    password: ${MNSS_LOCAL_DB_PASSWORD}
  rabbitmq:
    host: ${MNSS_LOCAL_RABBITMQ_HOST:localhost}
    port: ${MNSS_LOCAL_RABBITMQ_PORT:5672}
    username: ${MNSS_LOCAL_RABBITMQ_USER}
    password: ${MNSS_LOCAL_RABBITMQ_PASSWORD}
  data:
    redis:
      host: ${MNSS_LOCAL_REDIS_HOST:localhost}
      port: ${MNSS_LOCAL_REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${MNSS_LOCAL_API_PORT:8080}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mnss:
  environment: local
  cors:
    allowed-origins: ${MNSS_CORS_ALLOWED_ORIGINS:http://localhost,http://127.0.0.1}
  security:
    enabled: ${MNSS_SECURITY_ENABLED:true}
    hsts-enabled: ${MNSS_HSTS_ENABLED:false}
    cookie:
      secure: ${MNSS_AUTH_COOKIE_SECURE:false}
    token:
      secret: ${AUTH_TOKEN_SECRET}
      ttl: ${AUTH_TOKEN_TTL:PT8H}
    initial-admin:
      enabled: ${MNSS_INITIAL_ADMIN_ENABLED:true}
      name: ${MNSS_INITIAL_ADMIN_NAME:Administrador}
      email: ${MNSS_INITIAL_ADMIN_EMAIL:admin@novaalianca.local}
      username: ${MNSS_INITIAL_ADMIN_USERNAME:admin}
      password: ${MNSS_INITIAL_ADMIN_PASSWORD}
  sync:
    online-url: ${MNSS_ONLINE_URL:http://localhost:8081}
    store-id: ${MNSS_STORE_ID:store-001}
    store-secret: ${MNSS_STORE_SECRET:change_me}
    retry-intervals: 1m,5m,15m,1h
    require-https: ${MNSS_SYNC_REQUIRE_HTTPS:true}
  store:
    name: "Padaria e Lanchonete Nova Aliança"
    address: "Estr. Mineira, 703 - Parque Veneza"
    hours: "Segunda a Sábado: 05:30 as 21:00, Domingo: 05:30 as 14:00"
    phone: "(21) 96582-4610"
    description: "A melhor padaria da região, com pães frescos a toda hora e um cardápio completo para o seu dia a dia."
