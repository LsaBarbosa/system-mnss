spring:
  application:
    name: mnss-local-api
  datasource:
    url: ${MNSS_LOCAL_DB_URL:jdbc:postgresql://localhost:5432/mnss_local}
    username: ${MNSS_LOCAL_DB_USER:mnss}
    password: ${MNSS_LOCAL_DB_PASSWORD:mnss}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${MNSS_LOCAL_API_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mnss:
  environment: local
