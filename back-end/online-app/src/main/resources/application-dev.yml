    password: ${MNSS_ONLINE_DB_PASSWORD:change_me}
  rabbitmq:
    username: ${MNSS_ONLINE_RABBITMQ_USER:change_me}
    password: ${MNSS_ONLINE_RABBITMQ_PASSWORD:change_me}

mnss:
