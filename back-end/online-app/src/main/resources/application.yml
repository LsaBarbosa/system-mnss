spring:
  application:
    name: mnss-online-api
  datasource:
    url: ${MNSS_ONLINE_DB_URL:jdbc:postgresql://localhost:5433/nova_alianca_online}
    username: ${MNSS_ONLINE_DB_USER}
    password: ${MNSS_ONLINE_DB_PASSWORD}
  rabbitmq:
    host: ${MNSS_ONLINE_RABBITMQ_HOST:localhost}
    port: ${MNSS_ONLINE_RABBITMQ_PORT:5673}
    username: ${MNSS_ONLINE_RABBITMQ_USER}
    password: ${MNSS_ONLINE_RABBITMQ_PASSWORD}
  data:
    redis:
      host: ${MNSS_ONLINE_REDIS_HOST:localhost}
      port: ${MNSS_ONLINE_REDIS_PORT:6380}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${MNSS_ONLINE_API_PORT:8081}

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mnss:
  environment: online
  cors:
    allowed-origins: ${MNSS_CORS_ALLOWED_ORIGINS:https://padarianovaalianca.com.br,https://admin.padarianovaalianca.com.br}
  security:
    hsts-enabled: ${MNSS_HSTS_ENABLED:true}
  online:
    sync-master-secret: ${SYNC_MASTER_SECRET:}
  sync:
    default-store-id: ${MNSS_DEFAULT_STORE_ID:store-001}
    stores:
      store-001: ${MNSS_STORE_001_SECRET}
  payment:
    webhook-secret: ${MNSS_PAYMENT_WEBHOOK_SECRET}
  store:
    name: "Padaria e Lanchonete Nova Aliança"
    address: "Estr. Mineira, 703 - Parque Veneza, Magé - RJ, 25930-790"
    hours: "Segunda a Domingo: 05:30 às 21:00"
    phone: "(21) 96582-4610"
    description: "Pães, lanches, bolos, salgados e encomendas preparados com carinho em Parque Veneza, Magé."
  whatsapp:
    provider: ${WHATSAPP_PROVIDER:mock}
    verify-token: ${WHATSAPP_VERIFY_TOKEN}
