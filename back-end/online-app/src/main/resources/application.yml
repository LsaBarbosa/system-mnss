spring:
  application:
    name: mnss-online-api
  datasource:
    url: ${MNSS_ONLINE_DB_URL:jdbc:postgresql://localhost:5433/mnss_online}
    username: ${MNSS_ONLINE_DB_USER}
    password: ${MNSS_ONLINE_DB_PASSWORD}
  rabbitmq:
    host: ${MNSS_ONLINE_RABBITMQ_HOST:localhost}
    port: ${MNSS_ONLINE_RABBITMQ_PORT:5673}
    username: ${MNSS_ONLINE_RABBITMQ_USER}
    password: ${MNSS_ONLINE_RABBITMQ_PASSWORD}
  data:
    redis:
      host: ${MNSS_ONLINE_REDIS_HOST:localhost}
      port: ${MNSS_ONLINE_REDIS_PORT:6380}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${MNSS_ONLINE_API_PORT:8081}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mnss:
  environment: online
  sync:
    default-store-id: ${MNSS_DEFAULT_STORE_ID:store-001}
    stores:
      store-001: ${MNSS_STORE_001_SECRET}
  payment:
    webhook-secret: ${MNSS_PAYMENT_WEBHOOK_SECRET}
  store:
    name: "Padaria e Lanchonete Nova Aliança"
    address: "Rua Exemplo, 123 - Centro"
    hours: "Segunda a Sábado: 06:00 as 22:00, Domingo: 06:00 as 12:00"
    phone: "(11) 99999-9999"
    description: "A melhor padaria da região, com pães frescos a toda hora e um cardápio completo para o seu dia a dia."
  whatsapp:
    provider: ${WHATSAPP_PROVIDER:mock}
    verify-token: ${WHATSAPP_VERIFY_TOKEN}
