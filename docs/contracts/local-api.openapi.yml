openapi: 3.0.3
info:
  title: Sistema MNSS Local API
  version: 0.0.1
paths:
  /api/auth/login:
    post:
      summary: Autentica usuario interno.
      operationId: loginInternalUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login aceito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/auth/me:
    get:
      summary: Retorna usuario autenticado.
      operationId: getAuthenticatedUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/users:
    get:
      summary: Lista usuarios internos.
      operationId: listInternalUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuarios cadastrados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '403':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
    post:
      summary: Cria usuario interno.
      operationId: createInternalUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: Usuario criado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/BusinessError'
        '409':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/roles:
    get:
      summary: Lista perfis disponiveis.
      operationId: listRoles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfis cadastrados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleResponse'
        '403':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/admin/critical-actions/authorize:
    post:
      summary: Valida acesso a uma acao critica.
      operationId: authorizeCriticalAction
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Acao critica autorizada.
        '403':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/categories:
    get:
      summary: Lista categorias do catalogo.
      operationId: listCategories
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: false
          schema:
            type: string
            enum: [ADMIN, PDV, SITE, WHATSAPP]
      responses:
        '200':
          description: Categorias cadastradas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
    post:
      summary: Cria categoria do catalogo.
      operationId: createCategory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryPayload'
      responses:
        '201':
          description: Categoria criada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/categories/{id}:
    patch:
      summary: Atualiza categoria do catalogo.
      operationId: updateCategory
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryPayload'
      responses:
        '200':
          description: Categoria atualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/products:
    get:
      summary: Lista produtos do catalogo.
      operationId: listProducts
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Produtos cadastrados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
    post:
      summary: Cria produto do catalogo.
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductPayload'
      responses:
        '201':
          description: Produto criado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/products/{id}:
    patch:
      summary: Atualiza produto do catalogo.
      operationId: updateProduct
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductPayload'
      responses:
        '200':
          description: Produto atualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/products/{id}/availability:
    patch:
      summary: Atualiza disponibilidade real de um produto.
      operationId: updateProductAvailability
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductAvailabilityPayload'
      responses:
        '200':
          description: Disponibilidade atualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductAvailabilityResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/products/barcode/{barcode}:
    get:
      summary: Busca produto vendavel por codigo de barras.
      operationId: findProductByBarcode
      security:
        - bearerAuth: []
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Produto vendavel encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/pdv/products:
    get:
      summary: Lista produtos vendaveis para o PDV.
      operationId: listPdvProducts
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Produtos agrupados por categoria.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryProductsResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/pdv/products/barcode/{barcode}:
    get:
      summary: Busca produto vendavel para o PDV por codigo de barras.
      operationId: findPdvProductByBarcode
      security:
        - bearerAuth: []
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Produto vendavel encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/pdv/sales:
    get:
      summary: Lista vendas presenciais do PDV.
      operationId: listPdvSales
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Vendas PDV encontradas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PdvSaleResponse'
        '403':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
    post:
      summary: Inicia venda presencial no PDV.
      operationId: createPdvSale
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Venda criada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdvSaleResponse'
        '400':
          $ref: '#/components/responses/BusinessError'
        '403':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/pdv/sales/{saleId}:
    get:
      summary: Retorna venda presencial do PDV.
      operationId: getPdvSale
      security:
        - bearerAuth: []
      parameters:
        - name: saleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Venda encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdvSaleResponse'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/pdv/sales/{saleId}/items:
    post:
      summary: Adiciona produto ao carrinho da venda PDV.
      operationId: addPdvSaleItem
      security:
        - bearerAuth: []
      parameters:
        - name: saleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePdvSaleItemRequest'
      responses:
        '201':
          description: Carrinho atualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdvSaleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/BusinessError'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/pdv/sales/{saleId}/items/{itemId}:
    patch:
      summary: Altera quantidade de um item da venda PDV.
      operationId: updatePdvSaleItem
      security:
        - bearerAuth: []
      parameters:
        - name: saleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchPdvSaleItemRequest'
      responses:
        '200':
          description: Carrinho atualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdvSaleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/BusinessError'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
    delete:
      summary: Remove item do carrinho da venda PDV.
      operationId: removePdvSaleItem
      security:
        - bearerAuth: []
      parameters:
        - name: saleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Carrinho atualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdvSaleResponse'
        '403':
          $ref: '#/components/responses/BusinessError'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/orders/{orderId}/payments:
    post:
      summary: Registra pagamento e finaliza venda local.
      operationId: createOrderPayment
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Pagamento registrado e venda finalizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/BusinessError'
        '404':
          $ref: '#/components/responses/BusinessError'
        '409':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/public/menu:
    get:
      summary: Lista cardapio publico filtrado por disponibilidade online.
      operationId: listPublicMenu
      responses:
        '200':
          description: Produtos online agrupados por categoria.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryProductsResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/cash-register/open:
    post:
      summary: Abre caixa do operador autenticado.
      operationId: openCashRegister
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CashRegisterOpenRequest'
      responses:
        '201':
          description: Caixa aberto.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashRegisterResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/BusinessError'
        '409':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/cash-register/current:
    get:
      summary: Retorna caixa aberto do operador autenticado.
      operationId: getCurrentCashRegister
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Estado atual do caixa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentCashRegisterResponse'
        '403':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/cash-register/{id}/movement:
    post:
      summary: Registra sangria ou suprimento no caixa.
      operationId: createCashMovement
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CashMovementRequest'
      responses:
        '200':
          description: Movimento registrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashMovementResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/BusinessError'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/cash-register/{id}/close:
    post:
      summary: Fecha caixa e retorna resumo.
      operationId: closeCashRegister
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CashRegisterCloseRequest'
      responses:
        '200':
          description: Caixa fechado com resumo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashRegisterSummaryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/BusinessError'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/cash-register/{id}/summary:
    get:
      summary: Retorna resumo do caixa.
      operationId: getCashRegisterSummary
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resumo do caixa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashRegisterSummaryResponse'
        '403':
          $ref: '#/components/responses/BusinessError'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/stock-movements:
    get:
      summary: Lista movimentacoes de estoque.
      operationId: listStockMovements
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Movimentacoes registradas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockMovementResponse'
        '403':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
    post:
      summary: Registra movimentacao de estoque local.
      operationId: createStockMovement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockMovementPayload'
      responses:
        '201':
          description: Movimentacao registrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/BusinessError'
        '404':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/stock-movements/balances:
    get:
      summary: Lista saldo total de estoque por produto.
      operationId: listStockBalances
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Saldos calculados por produto.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockBalanceResponse'
        '403':
          $ref: '#/components/responses/BusinessError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/ping:
    get:
      summary: Verifica a disponibilidade basica da API local.
      operationId: pingLocalApi
      responses:
        '200':
          description: API local disponivel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/health:
    get:
      summary: Verifica a saude tecnica da API local e dependencias internas.
      operationId: localApiTechnicalHealth
      responses:
        '200':
          description: Estado tecnico consolidado da API local.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /actuator/health:
    get:
      summary: Health check tecnico do Spring Actuator.
      operationId: localApiHealth
      responses:
        '200':
          description: Estado tecnico da aplicacao.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  responses:
    ValidationError:
      description: Requisicao invalida por erro de validacao.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    BusinessError:
      description: Regra de negocio impediu a operacao.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnexpectedError:
      description: Erro inesperado sem vazamento de detalhes internos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    ApiError:
      type: object
      required:
        - code
        - message
        - status
        - path
        - timestamp
        - validationErrors
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Campos invalidos na requisicao.
        status:
          type: integer
          example: 400
        path:
          type: string
          example: /api/ping
        timestamp:
          type: string
          format: date-time
        validationErrors:
          type: array
          items:
            $ref: '#/components/schemas/ApiFieldError'
    ApiFieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          example: name
        message:
          type: string
          example: must not be blank
    PingResponse:
      type: object
      required:
        - message
        - application
        - environment
        - checkedAt
      properties:
        message:
          type: string
          example: pong
        application:
          type: string
          example: mnss-local-api
        environment:
          type: string
          example: local
        checkedAt:
          type: string
          format: date-time
    HealthResponse:
      type: object
      required:
        - status
        - environment
        - offlineCriticalOperation
        - message
        - checkedAt
        - components
      properties:
        status:
          type: string
          enum: [UP, DOWN, OUT_OF_SERVICE, UNKNOWN]
          example: UP
        environment:
          type: string
          example: local
        offlineCriticalOperation:
          type: boolean
          example: true
        message:
          type: string
          example: PDV, caixa, KDS e banco local devem operar sem internet
        checkedAt:
          type: string
          format: date-time
        components:
          type: object
          additionalProperties:
            type: string
          example:
            db: UP
            redis: UP
            rabbit: UP
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
