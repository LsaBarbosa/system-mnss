openapi: 3.0.3
info:
  title: Sistema MNSS Online API
  version: 0.0.2
  x-mnss-status-legend:
    mvp: Obrigatório para operação mínima do sistema online
    implemented: Implementado e homologado além do MVP
    experimental: Implementado mas ainda não totalmente homologado
    future: Planejado, ainda não implementado
    deprecated: Será removido em versão futura
paths:
  /api/health:
    x-mnss-status: mvp
    get:
      summary: Verifica a disponibilidade basica da API online.
      operationId: onlineApiHealthStatus
      responses:
        '200':
          description: API online disponivel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/version:
    x-mnss-status: implemented
    get:
      summary: Retorna a versao da API online.
      operationId: onlineApiVersion
      responses:
        '200':
          description: Versao atual da aplicacao.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /api/auth/login:
    x-mnss-status: mvp
    post:
      summary: Autentica usuario interno do painel online e retorna token JWT.
      operationId: onlineAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciais invalidas.
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/auth/me:
    x-mnss-status: implemented
    get:
      summary: Retorna dados do usuario autenticado no painel online.
      operationId: onlineAuthMe
      security:
        - bearerAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Usuario autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: Nao autenticado.
        default:
          $ref: '#/components/responses/UnexpectedError'
  /actuator/health:
    get:
      summary: Health check tecnico do Spring Actuator.
      operationId: onlineActuatorHealth
      responses:
        '200':
          description: Estado tecnico da aplicacao.
  /api/public/menu:
    x-mnss-status: mvp
    get:
      summary: Lista o cardapio publico disponivel para canais online.
      operationId: listPublicMenu
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de categorias com produtos disponiveis.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicMenuResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/public/info:
    x-mnss-status: mvp
    get:
      summary: Retorna informacoes da loja para o site/cardapio.
      operationId: getStoreInfo
      responses:
        '200':
          description: Informacoes institucionais da loja.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreInfoResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/public/orders:
    x-mnss-status: implemented
    post:
      summary: Cria pedido online.
      operationId: createOnlineOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOnlineOrderRequest'
      responses:
        '201':
          description: Pedido criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnlineOrderResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/public/orders/{id}:
    x-mnss-status: implemented
    get:
      summary: Busca pedido online por ID.
      operationId: getOnlineOrderById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pedido encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnlineOrderResponse'
        '404':
          description: Pedido nao encontrado.
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/public/payments/online:
    x-mnss-status: implemented
    post:
      summary: Cria tentativa de pagamento online para pedido pendente.
      operationId: createOnlinePayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnlinePaymentRequest'
      responses:
        '200':
          description: Pagamento criado no gateway.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnlinePaymentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/public/payments/webhook:
    x-mnss-status: implemented
    post:
      summary: Recebe webhook do gateway e valida assinatura HMAC.
      operationId: processPaymentWebhook
      parameters:
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookRequest'
      responses:
        '200':
          description: Webhook processado com sucesso.
        '400':
          description: Payload invalido ou campos obrigatorios ausentes.
        '401':
          description: Assinatura invalida.
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/whatsapp/catalog:
    x-mnss-status: experimental
    get:
      summary: Lista produtos ativos para atendimento via WhatsApp.
      operationId: listWhatsAppCatalog
      security:
        - bearerAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Produtos vendaveis no canal WhatsApp.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicProductResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/whatsapp/conversations:
    x-mnss-status: experimental
    get:
      summary: Lista conversas de atendimento WhatsApp.
      operationId: listWhatsAppConversations
      security:
        - bearerAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Lista de conversas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/whatsapp/conversations/{id}/messages:
    x-mnss-status: experimental
    get:
      summary: Lista mensagens de uma conversa.
      operationId: getWhatsAppConversationMessages
      security:
        - bearerAuth: []
        - basicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Mensagens da conversa.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Conversa nao encontrada.
    post:
      summary: Envia mensagem manual para uma conversa.
      operationId: sendWhatsAppConversationMessage
      security:
        - bearerAuth: []
        - basicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Mensagem enviada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Conversa nao encontrada.
  /api/whatsapp/conversations/{id}/assign:
    x-mnss-status: experimental
    post:
      summary: Atribui conversa para um usuario operador.
      operationId: assignWhatsAppConversation
      security:
        - bearerAuth: []
        - basicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignConversationRequest'
      responses:
        '200':
          description: Conversa atribuida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '404':
          description: Conversa nao encontrada.
  /api/whatsapp/orders:
    x-mnss-status: experimental
    post:
      summary: Cria pedido assistido a partir de uma conversa WhatsApp.
      operationId: createWhatsAppAssistedOrder
      security:
        - bearerAuth: []
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWhatsAppOrderRequest'
      responses:
        '201':
          description: Pedido criado e vinculado a conversa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnlineOrderResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/whatsapp/webhook:
    x-mnss-status: experimental
    get:
      summary: Endpoint de verificacao do webhook do provedor WhatsApp.
      operationId: verifyWhatsAppWebhook
      parameters:
        - name: hub.mode
          in: query
          required: false
          schema:
            type: string
        - name: hub.verify_token
          in: query
          required: false
          schema:
            type: string
        - name: hub.challenge
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Token validado e challenge devolvido.
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: Validacao rejeitada.
    post:
      summary: Recebe notificacoes do provedor WhatsApp.
      operationId: receiveWhatsAppWebhook
      parameters:
        - name: X-Hub-Signature-256
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WhatsAppWebhookPayload'
      responses:
        '200':
          description: Payload aceito para processamento assíncrono.
        '401':
          description: Assinatura invalida.
  /api/sync/events:
    x-mnss-status: mvp
    post:
      summary: Recebe um evento de sincronizacao vindo da loja.
      operationId: receiveSyncEvent
      parameters:
        - name: X-Store-ID
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncEventRequest'
      responses:
        '200':
          description: Evento recebido com sucesso ou duplicado ignorado.
        '400':
          description: Payload invalido.
        '401':
          description: Assinatura ou Store ID invalidos.
        default:
          $ref: '#/components/responses/UnexpectedError'
    get:
      summary: Lista eventos de sincronizacao por ordem de criacao (desc).
      operationId: listSyncEvents
      security:
        - bearerAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Lista de eventos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SyncEventResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/sync/pending:
    x-mnss-status: mvp
    get:
      summary: Retorna eventos pendentes para uma loja por pull.
      operationId: getPendingSyncEvents
      parameters:
        - name: X-Store-ID
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
        - name: storeId
          in: query
          required: false
          schema:
            type: string
          description: Deve ser igual ao X-Store-ID quando informado.
      responses:
        '200':
          description: Lista de eventos pendentes pertencentes a loja.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SyncEventResponse'
        '401':
          description: Assinatura ou Store ID invalidos.
        '403':
          description: Consulta para loja diferente do cabecalho.
  /api/sync/events/{id}/ack:
    x-mnss-status: mvp
    post:
      summary: Confirma o recebimento de um evento pela loja dona do evento.
      operationId: acknowledgeSyncEvent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Store-ID
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evento confirmado.
        '401':
          description: Assinatura ou Store ID invalidos.
        '403':
          description: Evento nao pertence a loja informada.
        '404':
          description: Evento nao encontrado.
  /api/sync/events/{id}/reprocess:
    x-mnss-status: implemented
    post:
      summary: Reenvia evento para processamento manual.
      operationId: reprocessSyncEvent
      security:
        - bearerAuth: []
        - basicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Evento marcado como pendente novamente.
        '404':
          description: Evento nao encontrado.
  /api/sync/events/{id}/ignore:
    x-mnss-status: implemented
    post:
      summary: Ignora um evento com motivo operacional.
      operationId: ignoreSyncEvent
      security:
        - bearerAuth: []
        - basicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IgnoreSyncEventRequest'
      responses:
        '200':
          description: Evento marcado como ignorado.
        '404':
          description: Evento nao encontrado.
  /api/sync/status:
    x-mnss-status: implemented
    get:
      summary: Retorna estatisticas de sincronizacao para o dashboard.
      operationId: getSyncStatus
      security:
        - bearerAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Contagem de eventos por status.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
  /api/sync/health:
    x-mnss-status: implemented
    get:
      summary: Retorna o estado operacional da sincronizacao.
      operationId: getSyncHealth
      security:
        - bearerAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Status e detalhes do componente de sync.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncHealthResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    basicAuth:
      type: http
      scheme: basic
  responses:
    ValidationError:
      description: Requisicao invalida por erro de validacao.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    BusinessError:
      description: Regra de negocio impediu a operacao.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnexpectedError:
      description: Erro inesperado sem vazamento de detalhes internos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    ApiError:
      type: object
      required:
        - code
        - message
        - status
        - path
        - timestamp
        - validationErrors
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Campos invalidos na requisicao.
        status:
          type: integer
          example: 400
        path:
          type: string
          example: /api/health
        timestamp:
          type: string
          format: date-time
        validationErrors:
          type: array
          items:
            $ref: '#/components/schemas/ApiFieldError'
    ApiFieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          example: name
        message:
          type: string
          example: must not be blank
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
    AuthResponse:
      type: object
      required:
        - token
        - expiresAt
        - user
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/AuthUserResponse'
    AuthUserResponse:
      type: object
      required:
        - id
        - name
        - email
        - username
        - active
        - roles
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        username:
          type: string
        active:
          type: boolean
        roles:
          type: array
          items:
            type: string
    VersionResponse:
      type: object
      required:
        - version
      properties:
        version:
          type: string
          example: 0.0.1-MVP
    HealthResponse:
      type: object
      required:
        - status
        - environment
        - offlineCriticalOperation
        - message
        - version
        - timestamp
        - components
      properties:
        status:
          type: string
          enum: [UP, DOWN, OUT_OF_SERVICE, UNKNOWN]
          example: UP
        environment:
          type: string
          example: online
        offlineCriticalOperation:
          type: boolean
          example: false
        message:
          type: string
          example: Canais externos, webhooks e sincronizacao via HTTPS
        version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time
        components:
          type: object
          additionalProperties:
            type: string
          example:
            db: UP
            redis: UP
            rabbit: UP
    PublicCategoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        displayOrder:
          type: integer
        imageUrl:
          type: string
          nullable: true
    PublicProductResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        promotionalPrice:
          type: number
          format: double
          nullable: true
        imageUrl:
          type: string
          nullable: true
        unitType:
          type: string
        preparationSector:
          type: string
        preparationTimeMinutes:
          type: integer
          nullable: true
    PublicMenuResponse:
      type: object
      properties:
        category:
          $ref: '#/components/schemas/PublicCategoryResponse'
        products:
          type: array
          items:
            $ref: '#/components/schemas/PublicProductResponse'
    StoreInfoResponse:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        hours:
          type: string
        phone:
          type: string
        description:
          type: string
    ConversationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customerPhone:
          type: string
        customerName:
          type: string
        status:
          type: string
          enum: [OPEN, ASSIGNED, CLOSED]
        assignedTo:
          type: string
          format: uuid
          nullable: true
        orderId:
          type: string
          format: uuid
          nullable: true
        lastMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MessageResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        direction:
          type: string
          enum: [INBOUND, OUTBOUND]
        senderPhone:
          type: string
        senderName:
          type: string
          nullable: true
        content:
          type: string
        messageType:
          type: string
        status:
          type: string
          enum: [RECEIVED, SENT, FAILED]
        createdAt:
          type: string
          format: date-time
    SendMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
    AssignConversationRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid
    CustomerRequest:
      type: object
      required:
        - name
        - phone
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        document:
          type: string
    AddressRequest:
      type: object
      properties:
        street:
          type: string
        number:
          type: string
        neighborhood:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
    OnlineOrderItemRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: number
          format: double
        observation:
          type: string
    CreateOnlineOrderRequest:
      type: object
      required:
        - customer
        - deliveryType
        - items
        - paymentMethod
      properties:
        customer:
          $ref: '#/components/schemas/CustomerRequest'
        deliveryType:
          type: string
        address:
          $ref: '#/components/schemas/AddressRequest'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OnlineOrderItemRequest'
        notes:
          type: string
        paymentMethod:
          type: string
    OnlineOrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: integer
          format: int64
        status:
          type: string
        paymentStatus:
          type: string
        deliveryType:
          type: string
        subtotal:
          type: number
          format: double
        discountAmount:
          type: number
          format: double
        deliveryFee:
          type: number
          format: double
        totalAmount:
          type: number
          format: double
        paymentMethod:
          type: string
    OnlinePaymentRequest:
      type: object
      required:
        - orderId
        - method
      properties:
        orderId:
          type: string
          format: uuid
        method:
          type: string
    OnlinePaymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        method:
          type: string
        status:
          type: string
        amount:
          type: number
          format: double
        transactionId:
          type: string
        qrCodeBase64:
          type: string
        qrCodeCopyPaste:
          type: string
        paymentUrl:
          type: string
    PaymentWebhookRequest:
      type: object
      required:
        - transactionId
        - status
      properties:
        transactionId:
          type: string
        status:
          type: string
        gateway:
          type: string
        payload:
          type: object
          additionalProperties: true
    CreateWhatsAppOrderRequest:
      type: object
      required:
        - conversationId
        - customerPhone
        - customerName
        - deliveryType
        - items
      properties:
        conversationId:
          type: string
          format: uuid
        customerPhone:
