openapi: 3.0.3
info:
  title: Sistema MNSS Online API
  version: 0.0.1
paths:
  /api/health:
    get:
      summary: Verifica a disponibilidade basica da API online.
      operationId: onlineApiHealthStatus
      responses:
        '200':
          description: API online disponivel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          $ref: '#/components/responses/UnexpectedError'
  /actuator/health:
    get:
      summary: Health check tecnico do Spring Actuator.
      operationId: onlineActuatorHealth
      responses:
        '200':
          description: Estado tecnico da aplicacao.
  /api/sync/events:
    post:
      summary: Recebe um evento de sincronizacao vindo da loja.
      operationId: receiveSyncEvent
      parameters:
        - name: X-Store-ID
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncEventRequest'
      responses:
        '200':
          description: Evento recebido com sucesso ou duplicado ignorado.
        '401':
          description: Assinatura ou Store ID invalidos.
        default:
          $ref: '#/components/responses/UnexpectedError'
  /api/sync/pending:
    get:
      summary: Retorna eventos pendentes para serem baixados pela loja.
      operationId: getPendingSyncEvents
      parameters:
        - name: X-Store-ID
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de eventos pendentes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SyncEventResponse'
        '401':
          description: Assinatura ou Store ID invalidos.
  /api/sync/events/{id}/ack:
    post:
      summary: Confirma o recebimento de um evento pela loja.
      operationId: acknowledgeSyncEvent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Store-ID
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evento confirmado.
        '404':
          description: Evento nao encontrado.
  /api/sync/status:
    get:
      summary: Retorna estatisticas de sincronizacao para o dashboard.
      operationId: getSyncStatus
      responses:
        '200':
          description: Contagem de eventos por status.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
components:
  responses:
    ValidationError:
      description: Requisicao invalida por erro de validacao.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    BusinessError:
      description: Regra de negocio impediu a operacao.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnexpectedError:
      description: Erro inesperado sem vazamento de detalhes internos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    ApiError:
      type: object
      required:
        - code
        - message
        - status
        - path
        - timestamp
        - validationErrors
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Campos invalidos na requisicao.
        status:
          type: integer
          example: 400
        path:
          type: string
          example: /api/health
        timestamp:
          type: string
          format: date-time
        validationErrors:
          type: array
          items:
            $ref: '#/components/schemas/ApiFieldError'
    ApiFieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          example: name
        message:
          type: string
          example: must not be blank
    HealthResponse:
      type: object
      required:
        - status
        - environment
        - offlineCriticalOperation
        - message
        - version
        - timestamp
        - components
      properties:
        status:
          type: string
          enum: [UP, DOWN, OUT_OF_SERVICE, UNKNOWN]
          example: UP
        environment:
          type: string
          example: online
        offlineCriticalOperation:
          type: boolean
          example: false
        message:
          type: string
          example: Canais externos, webhooks e sincronizacao via HTTPS
        version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time
        components:
          type: object
          additionalProperties:
            type: string
          example:
            db: UP
            redis: UP
            rabbit: UP
    SyncEventRequest:
      type: object
      required:
        - aggregateType
        - eventType
        - payload
      properties:
        aggregateType:
          type: string
        aggregateId:
          type: string
          format: uuid
        eventType:
          type: string
        payload:
          type: object
    SyncEventResponse:
      type: object
      required:
        - id
        - idempotencyKey
        - direction
        - sourceEnvironment
        - targetEnvironment
        - aggregateType
        - eventType
        - payload
        - status
        - retryCount
        - createdAt
        - updatedAt
        - version
      properties:
        id:
          type: string
          format: uuid
        idempotencyKey:
          type: string
        direction:
          type: string
          enum: [LOCAL_TO_ONLINE, ONLINE_TO_LOCAL]
        sourceEnvironment:
          type: string
          enum: [LOCAL, ONLINE]
        targetEnvironment:
          type: string
          enum: [LOCAL, ONLINE]
        aggregateType:
          type: string
        aggregateId:
          type: string
          format: uuid
        eventType:
          type: string
        payload:
          type: object
        status:
          type: string
          enum: [PENDING, PROCESSING, SYNCED, FAILED, RETRYING, IGNORED, RECEIVED_BY_STORE, DEAD_LETTER]
        retryCount:
          type: integer
        nextRetryAt:
          type: string
          format: date-time
        lastError:
          type: string
        processedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
