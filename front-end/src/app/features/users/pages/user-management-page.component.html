<main class="users-shell">
  <header class="topbar">
    <div>
      <p>Seguranca</p>
      <h1>Usuarios internos</h1>
    </div>
    <a routerLink="/">Console</a>
  </header>

  <mnss-error-banner />

  <section class="content-grid">
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <h2>Novo usuario</h2>

      <label>
        Nome
        <input type="text" formControlName="name" />
      </label>

      <label>
        Email
        <input type="email" formControlName="email" />
      </label>

      <label>
        Usuario
        <input type="text" formControlName="username" autocomplete="username" />
      </label>

      <label>
        Senha
        <input type="password" formControlName="password" autocomplete="new-password" />
      </label>

      <fieldset>
        <legend>Perfis</legend>
        <label class="role-option" *ngFor="let role of roles">
          <input
            type="checkbox"
            [checked]="hasRole(role.name)"
            (change)="toggleRole(role.name, $any($event.target).checked)"
          />
          {{ role.name }}
        </label>
      </fieldset>

      <label class="active-option">
        <input type="checkbox" formControlName="active" />
        Ativo
      </label>

      <button type="submit" [disabled]="form.invalid || form.controls.roles.value.length === 0 || saving">
        {{ saving ? 'Salvando' : 'Cadastrar' }}
      </button>
    </form>

    <section class="user-list" aria-label="Usuarios cadastrados">
      <article *ngFor="let user of users">
        <div>
          <strong>{{ user.name }}</strong>
          <span>{{ user.username }}</span>
        </div>
        <ul>
          <li *ngFor="let role of user.roles">{{ role }}</li>
        </ul>
      </article>
    </section>
  </section>
</main>
