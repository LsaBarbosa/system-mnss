services:
  postgres-local:
    image: postgres:17
    container_name: postgres-local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nova_alianca_local}
      POSTGRES_USER: ${POSTGRES_USER:-nova_alianca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./postgres/backup:/backup
    restart: unless-stopped

  rabbitmq-local:
    image: rabbitmq:4-management
    container_name: rabbitmq-local
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-nova_alianca}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change_me}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_local_data:/var/lib/rabbitmq
    restart: unless-stopped

  redis-local:
    image: redis:8
    container_name: redis-local
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_local_data:/data
    restart: unless-stopped

volumes:
  postgres_local_data:
  rabbitmq_local_data:
  redis_local_data:

