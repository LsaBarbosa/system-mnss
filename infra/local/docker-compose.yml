services:
  nova-alianca-local-api:
    build:
      context: ../../back-end
      dockerfile: local-app/Dockerfile
    container_name: nova-alianca-local-api
    depends_on:
      postgres-local:
        condition: service_healthy
      rabbitmq-local:
        condition: service_healthy
      redis-local:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}

      MNSS_LOCAL_DB_URL: jdbc:postgresql://postgres-local:5432/${POSTGRES_DB:-nova_alianca_local}
      MNSS_LOCAL_DB_USER: ${POSTGRES_USER:-nova_alianca}
      MNSS_LOCAL_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório — configure no .env}

      MNSS_LOCAL_RABBITMQ_HOST: rabbitmq-local
      MNSS_LOCAL_RABBITMQ_PORT: 5672
      MNSS_LOCAL_RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-nova_alianca}
      MNSS_LOCAL_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS obrigatório — configure no .env}

      MNSS_LOCAL_REDIS_HOST: redis-local
      MNSS_LOCAL_REDIS_PORT: ${REDIS_PORT:-6379}

      MNSS_LOCAL_API_PORT: 8080
      MNSS_CORS_ALLOWED_ORIGINS: ${MNSS_CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      MNSS_HSTS_ENABLED: ${MNSS_HSTS_ENABLED:-false}

      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET obrigatório — mínimo 32 bytes, configure no .env}
      AUTH_TOKEN_TTL: ${AUTH_TOKEN_TTL:-PT8H}

      MNSS_INITIAL_ADMIN_USERNAME: ${MNSS_INITIAL_ADMIN_USERNAME:-admin}
      MNSS_INITIAL_ADMIN_PASSWORD: ${MNSS_INITIAL_ADMIN_PASSWORD:?MNSS_INITIAL_ADMIN_PASSWORD obrigatório — configure no .env}
      MNSS_INITIAL_ADMIN_EMAIL: ${MNSS_INITIAL_ADMIN_EMAIL:-admin@novaalianca.local}

      MNSS_ONLINE_URL: ${MNSS_ONLINE_URL:-https://api.padarianovaalianca.com.br}
      MNSS_STORE_ID: ${MNSS_STORE_ID:-store-001}
      MNSS_STORE_SECRET: ${MNSS_STORE_SECRET:?MNSS_STORE_SECRET obrigatório — mínimo 32 bytes, configure no .env}
      MNSS_SYNC_REQUIRE_HTTPS: ${MNSS_SYNC_REQUIRE_HTTPS:-true}
    ports:
      - "127.0.0.1:${LOCAL_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  nova-alianca-local-front:
    build:
      context: ../../front-end
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: local
    container_name: nova-alianca-local-front
    depends_on:
      nova-alianca-local-api:
        condition: service_healthy
    restart: unless-stopped

  nginx-local:
    image: nginx:stable
    container_name: nginx-local
    depends_on:
      nova-alianca-local-api:
        condition: service_healthy
      nova-alianca-local-front:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/conf.d/local.conf:/etc/nginx/conf.d/local.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && test -f /var/run/nginx.pid"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres-local:
    image: postgres:17
    container_name: postgres-local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nova_alianca_local}
      POSTGRES_USER: ${POSTGRES_USER:-nova_alianca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório — configure no .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./postgres/backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nova_alianca}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq-local:
    image: rabbitmq:4-management
    container_name: rabbitmq-local
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-nova_alianca}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS obrigatório — configure no .env}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_local_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redis-local:
    image: redis:8
    container_name: redis-local
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_local_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_local_data:
  rabbitmq_local_data:
  redis_local_data:
