services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-local
    environment:
      POSTGRES_DB: nova_alianca_local
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts:/backup

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq-local
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password

  redis:
    image: redis:8-alpine
    container_name: redis-local
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"

  local-app:
    build:
      context: ../../back-end
      dockerfile: local-app/Dockerfile
    container_name: nova-alianca-local-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nova_alianca_local
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
      MNSS_SYNC_ONLINE_URL: http://online-app:8081
    depends_on:
      - postgres
      - rabbitmq
      - redis

  nginx-local:
    image: nginx:stable-alpine
    container_name: nginx-local
    depends_on:
      - local-app
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    restart: unless-stopped

volumes:
  postgres_data:
