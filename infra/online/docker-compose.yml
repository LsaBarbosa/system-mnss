services:
  nova-alianca-online-api:
    build:
      context: ../../back-end
      dockerfile: online-app/Dockerfile
    container_name: nova-alianca-online-api
    depends_on:
      - postgres-online
      - rabbitmq-online
      - redis-online
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-online}
      DB_HOST: postgres-online
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-nova_alianca_online}
      POSTGRES_USER: ${POSTGRES_USER:-nova_alianca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      RABBITMQ_HOST: rabbitmq-online
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-nova_alianca}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change_me}
      REDIS_HOST: redis-online
      REDIS_PORT: ${REDIS_PORT:-6379}
      ONLINE_API_PORT: ${ONLINE_API_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      SYNC_MASTER_SECRET: ${SYNC_MASTER_SECRET:-change_me}
      SITE_URL: ${SITE_URL:-https://padarianovaalianca.com.br}
      API_URL: ${API_URL:-https://api.padarianovaalianca.com.br}
      ADMIN_URL: ${ADMIN_URL:-https://admin.padarianovaalianca.com.br}
      MNSS_STORE_001_SECRET: ${MNSS_STORE_001_SECRET:-change_me}
      MNSS_DEFAULT_STORE_ID: ${MNSS_DEFAULT_STORE_ID:-store-001}
      MNSS_PAYMENT_WEBHOOK_SECRET: ${MNSS_PAYMENT_WEBHOOK_SECRET:-change_me}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-mock}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-change_me}
      SPRING_SECURITY_USER_NAME: ${SPRING_SECURITY_USER_NAME:-online_admin}
      SPRING_SECURITY_USER_PASSWORD: ${SPRING_SECURITY_USER_PASSWORD:-change_me}
    ports:
      - "127.0.0.1:${ONLINE_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  nova-alianca-site:
    build:
      context: ../../front-end
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: online
    container_name: nova-alianca-site
    depends_on:
      - nova-alianca-online-api
    restart: unless-stopped

  nova-alianca-admin:
    build:
      context: ../../front-end
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: online
    container_name: nova-alianca-admin
    depends_on:
      - nova-alianca-online-api
    restart: unless-stopped

  nginx:
    image: nginx:stable
    container_name: nginx
    depends_on:
      - nova-alianca-online-api
      - nova-alianca-site
      - nova-alianca-admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/conf.d/api.conf:/etc/nginx/conf.d/api.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    command: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h &
               wait $${!};
             done"
    restart: unless-stopped

  postgres-online:
    image: postgres:17
    container_name: postgres-online
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nova_alianca_online}
      POSTGRES_USER: ${POSTGRES_USER:-nova_alianca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_online_data:/var/lib/postgresql/data
      - ./postgres/backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nova_alianca}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq-online:
    image: rabbitmq:4-management
    container_name: rabbitmq-online
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-nova_alianca}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change_me}
    ports:
      - "127.0.0.1:5673:5672"
      - "127.0.0.1:15673:15672"
    volumes:
      - rabbitmq_online_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redis-online:
    image: redis:8
    container_name: redis-online
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_online_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_online_data:
  rabbitmq_online_data:
  redis_online_data:
