services:
  postgres-online:
    image: postgres:17-alpine
    container_name: postgres-online
    environment:
      POSTGRES_DB: nova_alianca_online
      POSTGRES_USER: online_user
      POSTGRES_PASSWORD: online_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_online_data:/var/lib/postgresql/data
      - ./scripts:/backup

  rabbitmq-online:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq-online
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: online_user
      RABBITMQ_DEFAULT_PASS: online_password

  redis-online:
    image: redis:8-alpine
    container_name: redis-online
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"

  online-app:
    build:
      context: ../../back-end
      dockerfile: online-app/Dockerfile
    container_name: nova-alianca-online-api
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-online:5432/nova_alianca_online
      SPRING_DATASOURCE_USERNAME: online_user
      SPRING_DATASOURCE_PASSWORD: online_password
      SPRING_RABBITMQ_HOST: rabbitmq-online
      SPRING_DATA_REDIS_HOST: redis-online
    depends_on:
      - postgres-online
      - rabbitmq-online
      - redis-online

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    depends_on:
      - online-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    restart: unless-stopped

volumes:
  postgres_online_data:
