# ─────────────────────────────────────────────────────────────────────────────
# Site público — padarianovaalianca.com.br / www.padarianovaalianca.com.br
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name padarianovaalianca.com.br www.padarianovaalianca.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name padarianovaalianca.com.br www.padarianovaalianca.com.br;

    ssl_certificate     /etc/letsencrypt/live/padarianovaalianca.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/padarianovaalianca.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass         http://nova-alianca-online-api:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location / {
        proxy_pass         http://nova-alianca-site:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

